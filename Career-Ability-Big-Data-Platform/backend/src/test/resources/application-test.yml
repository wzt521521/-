spring:
  datasource:
    url: jdbc:h2:mem:career_ability;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  cache:
    type: none
  redis:
    repositories:
      enabled: false
  sql:
    init:
      encoding: UTF-8
      mode: always
  task:
    scheduling:
      enabled: false

app:
  analytics:
    schedule: "0 0 0 1 1 *"

security:
  jwt:
    secret: test-only-secret-key-that-is-longer-than-thirty-two-bytes
    access-token-ttl: PT2H
    refresh-token-ttl: P7D
  cors:
    allowed-origins: http://localhost:5173,http://127.0.0.1:5173

springdoc:
  api-docs:
    enabled: false
